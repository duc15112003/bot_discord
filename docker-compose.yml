services:
  lavalink:
    # Lavalink v4.2.1 with DAVE (E2EE) support, alpine variant
    image: ghcr.io/lavalink-devs/lavalink:4.2.1-alpine
    container_name: lavalink
    restart: unless-stopped
    environment:
      # Java heap size for Lavalink (adjust if you have more/less RAM)
      - _JAVA_OPTIONS=-Xmx512m
      - SERVER_PORT=2333
      # Set password explicitly via env var (takes priority over application.yml)
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
    volumes:
      # Mount your Lavalink configuration file (includes password, plugins, etc.)
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
      # Persist plugins between restarts (optional but recommended for v4+)
      - ./lavalink/plugins/:/opt/Lavalink/plugins/
    networks:
      - lavalink
    expose:
      # Internal port exposed to other containers
      - 2333
    ports:
      # Public port (only needed if connecting from outside Docker)
      - "2333:2333"
      # To restrict to localhost only, you could instead use:
      # - "127.0.0.1:2333:2333"

      # ──────────────────────────────────────────────
      # MySQL Database Server
      # ──────────────────────────────────────────────
  mysql:
    image: mariadb:10.11
    container_name: mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: bot_discord_db
      MARIADB_USER: bot_user
      MARIADB_PASSWORD: bot_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mysql
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ──────────────────────────────────────────────
  # Database CLI
  # Usage: docker compose run --rm db-cli
  # ──────────────────────────────────────────────
  db-cli:
    image: mariadb:10.11
    container_name: db-cli
    profiles:
      - cli
    networks:
      - mysql
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: mariadb -hmysql -uroot -proot bot_discord_db
    stdin_open: true
    tty: true

networks:
  lavalink:
    name: lavalink
  mysql:
    name: mysql

volumes:
  mysql_data:
    name: bot_discord_mysql_data
